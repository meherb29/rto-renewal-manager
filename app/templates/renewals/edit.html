{% extends 'base.html' %}

{% block title %}Edit Renewal{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Edit renewal</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Insurer</label>
                <select name="insurer_id">
                    <option value="">Select insurer</option>
                    {% for insurer in insurers %}
                    <option value="{{ insurer.id }}" {{ 'selected' if renewal.insurer_id == insurer.id else '' }}>{{ insurer.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Policy number</label>
                <input type="text" name="policy_number" value="{{ renewal.policy_number or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Policy start date</label>
                <input type="date" name="policy_start" value="{{ renewal.policy_start or '' }}">
            </div>
            <div class="form-group">
                <label>Policy end date</label>
                <input type="date" name="policy_end" value="{{ renewal.policy_end or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>IDV (₹)</label>
                <input type="number" step="0.01" name="idv" value="{{ renewal.idv or '' }}">
            </div>
            <div class="form-group">
                <label>Assigned to</label>
                <select name="employee_id">
                    <option value="">Select employee</option>
                    {% for employee in employees %}
                    <option value="{{ employee.id }}" {{ 'selected' if renewal.employee_id == employee.id else '' }}>{{ employee.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    {% for s in ['open', 'in_progress', 'confirmed', 'completed', 'lapsed'] %}
                    <option value="{{ s }}" {{ 'selected' if renewal.status == s else '' }}>{{ s.replace('_',' ') }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Data confidence</label>
                <select name="data_confirmed">
                    <option value="confirmed" {{ 'selected' if renewal.data_confirmed else '' }}>Confirmed</option>
                    <option value="estimated" {{ 'selected' if not renewal.data_confirmed else '' }}>Estimated</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="3">{{ renewal.notes or '' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('renewals.renewal_detail', id=renewal.id) }}" class="btn" style="margin-left:8px">Cancel</a>
    </form>
</div>
{% endblock %}
