{% extends 'base.html' %}

{% block title %}New Vehicle{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Add vehicle for {{ customer.name }}</h1>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('vehicles.create_vehicle') }}">
        <input type="hidden" name="customer_id" value="{{ customer.id }}">

        <div class="form-row">
            <div class="form-group">
                <label>Vehicle category</label>
                <select name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" name="model" required placeholder="e.g. Tiger 75 4WD">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Registration number</label>
                <input type="text" name="registration_no" placeholder="e.g. MH-06-XX-1111">
            </div>
            <div class="form-group">
                <label>Year of manufacture</label>
                <input type="number" name="year_of_manufacture" placeholder="e.g. 2021">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Chassis number</label>
                <input type="text" name="chassis_no">
            </div>
            <div class="form-group">
                <label>Engine number</label>
                <input type="text" name="engine_no">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Passing type</label>
                <select name="passing_type">
                    {% for pt in passing_types %}
                    <option value="{{ pt }}">{{ pt }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Add vehicle</button>
        <a href="{{ url_for('customers.customer_detail', id=customer.id) }}" class="btn" style="margin-left:8px">Cancel</a>
    </form>
</div>
{% endblock %}
