{% extends 'base.html' %}

{% block title %}Edit Vehicle{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Edit vehicle</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Vehicle category</label>
                <select name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {{ 'selected' if vehicle.category == cat else '' }}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" name="model" value="{{ vehicle.model }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Registration number</label>
                <input type="text" name="registration_no" value="{{ vehicle.registration_no or '' }}">
            </div>
            <div class="form-group">
                <label>Year of manufacture</label>
                <input type="number" name="year_of_manufacture" value="{{ vehicle.year_of_manufacture or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Chassis number</label>
                <input type="text" name="chassis_no" value="{{ vehicle.chassis_no or '' }}">
            </div>
            <div class="form-group">
                <label>Engine number</label>
                <input type="text" name="engine_no" value="{{ vehicle.engine_no or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Passing type</label>
                <select name="passing_type">
                    {% for pt in passing_types %}
                    <option value="{{ pt }}" {{ 'selected' if vehicle.passing_type == pt else '' }}>{{ pt }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('vehicles.vehicle_detail', id=vehicle.id) }}" class="btn" style="margin-left:8px">Cancel</a>
    </form>
</div>
{% endblock %}
